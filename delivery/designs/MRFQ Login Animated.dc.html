<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face{font-family:'IBMPlexArabic';src:url('current/assets/fonts/IBMPlexSansArabic-Light.ttf') format('truetype');font-weight:300;font-display:swap}
@font-face{font-family:'IBMPlexArabic';src:url('current/assets/fonts/IBMPlexSansArabic-Regular.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'IBMPlexArabic';src:url('current/assets/fonts/IBMPlexSansArabic-Medium.ttf') format('truetype');font-weight:500;font-display:swap}
@font-face{font-family:'IBMPlexArabic';src:url('current/assets/fonts/IBMPlexSansArabic-SemiBold.ttf') format('truetype');font-weight:600;font-display:swap}
@font-face{font-family:'IBMPlexArabic';src:url('current/assets/fonts/IBMPlexSansArabic-Bold.ttf') format('truetype');font-weight:700;font-display:swap}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
@keyframes mrfqUp{from{transform:translateY(24px)}to{transform:translateY(0)}}
@keyframes mrfqInRight{from{transform:translateX(34px)}to{transform:translateX(0)}}
@keyframes mrfqPop{0%{transform:scale(.78)}62%{transform:scale(1.07)}100%{transform:scale(1)}}
@keyframes mrfqFloatA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(26px,-30px) scale(1.07)}}
@keyframes mrfqFloatB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,24px) scale(1.1)}}
@keyframes mrfqFloatC{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,20px)}}
@keyframes mrfqShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes mrfqSpin{to{transform:rotate(360deg)}}
@keyframes mrfqRingPulse{0%{transform:scale(.9);opacity:.55}70%{transform:scale(1.5);opacity:0}100%{opacity:0}}
@keyframes mrfqLine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes mrfqDot{0%,100%{opacity:.35}50%{opacity:1}}
@media (max-width:880px){.mrfq-hero{display:none!important}.mrfq-grid{grid-template-columns:1fr!important}}
</style>
</helmet>

<div dir="rtl" style="font-family:'IBMPlexArabic',system-ui,sans-serif;height:100vh;width:100%;display:grid;place-items:center;padding:20px;background:radial-gradient(ellipse at 14% 16%,rgba(0,132,141,.10),transparent 34%),radial-gradient(ellipse at 86% 8%,rgba(117,206,200,.12),transparent 30%),linear-gradient(155deg,#ECF4F1,#F0F4F2);overflow:hidden">
  <div class="mrfq-grid" style="width:min(1040px,100%);display:grid;grid-template-columns:minmax(0,1fr) 430px;background:#fff;border-radius:26px;box-shadow:0 30px 80px rgba(6,47,56,.16);overflow:hidden;min-height:600px">

    <!-- FORM PANEL (right in RTL) -->
    <div style="padding:54px 52px;display:flex;flex-direction:column;justify-content:center;position:relative;animation:mrfqInRight .8s .05s both cubic-bezier(.2,.75,.25,1)">
      <button onClick="{{ switchLang }}" style="position:absolute;top:24px;inset-inline-end:24px;width:42px;height:42px;border:1px solid #E1E9E6;background:#fff;border-radius:12px;display:grid;place-items:center;color:#26474D;cursor:pointer;transition:all .2s" style-hover="border-color:#00848D;color:#00848D;transform:rotate(18deg)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>
      </button>

      <div style="width:66px;height:66px;border-radius:19px;background:linear-gradient(135deg,#005257,#00848D);display:grid;place-items:center;margin-bottom:22px;box-shadow:0 10px 26px rgba(0,132,141,.3);animation:mrfqPop .7s .15s both;position:relative">
        <span style="color:#fff;font-weight:800;font-size:13px;letter-spacing:.5px">MRFQ</span>
        <span style="position:absolute;inset:0;border-radius:19px;border:2px solid #00848D;animation:mrfqRingPulse 2.6s 1s infinite"></span>
      </div>

      <h1 style="margin:0 0 6px;font-size:30px;font-weight:800;color:#123238;letter-spacing:-.5px;animation:mrfqUp .7s .25s both">أهلاً بعودتك</h1>
      <p style="margin:0 0 30px;font-size:15px;color:#6F787F;line-height:1.6;animation:mrfqUp .7s .32s both">سجّل دخولك للوصول إلى مركز عمليات المرافق.</p>

      <div style="animation:mrfqUp .7s .39s both">
        <label style="font-size:12px;font-weight:700;color:#6F787F;margin-bottom:7px;display:block">اسم المستخدم</label>
        <div style="position:relative;margin-bottom:18px">
          <span style="position:absolute;top:50%;inset-inline-start:15px;transform:translateY(-50%);color:#8A989C;display:flex;pointer-events:none"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <input defaultValue="m.alharbi" style="width:100%;height:52px;border:1.5px solid #E1E9E6;border-radius:13px;padding:0 16px 0 48px;font-size:15px;color:#123238;font-family:inherit;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s" style-focus="border-color:#00848D;box-shadow:0 0 0 4px rgba(0,132,141,.12)"/>
        </div>
      </div>

      <div style="animation:mrfqUp .7s .46s both">
        <label style="font-size:12px;font-weight:700;color:#6F787F;margin-bottom:7px;display:block">كلمة المرور</label>
        <div style="position:relative;margin-bottom:18px">
          <span style="position:absolute;top:50%;inset-inline-start:15px;transform:translateY(-50%);color:#8A989C;display:flex;pointer-events:none"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="{{ pwdType }}" defaultValue="123456789" style="width:100%;height:52px;border:1.5px solid #E1E9E6;border-radius:13px;padding:0 48px;font-size:15px;color:#123238;font-family:inherit;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s" style-focus="border-color:#00848D;box-shadow:0 0 0 4px rgba(0,132,141,.12)"/>
          <button onClick="{{ togglePwd }}" type="button" style="position:absolute;top:50%;inset-inline-end:10px;transform:translateY(-50%);width:34px;height:34px;border:0;background:transparent;color:#8A989C;display:grid;place-items:center;cursor:pointer;border-radius:9px;transition:color .2s" style-hover="color:#00848D">{{ eyeIcon }}</button>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;animation:mrfqUp .7s .53s both">
        <label onClick="{{ toggleRemember }}" style="display:flex;align-items:center;gap:9px;cursor:pointer;font-size:14px;color:#26474D;user-select:none">
          <span style="width:20px;height:20px;border-radius:6px;display:grid;place-items:center;transition:all .2s;{{ rememberBoxStyle }}">{{ rememberCheck }}</span>
          تذكّرني على هذا الجهاز
        </label>
        <a style="font-size:14px;color:#00848D;font-weight:600;text-decoration:none;cursor:pointer">نسيت كلمة المرور؟</a>
      </div>

      <button onClick="{{ doLogin }}" style="width:100%;height:54px;border:0;border-radius:15px;background:linear-gradient(110deg,#00848D,#00A488,#00848D);background-size:220% 100%;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 26px rgba(0,132,141,.26);animation:mrfqUp .7s .6s both,mrfqShimmer 3.2s linear infinite;transition:transform .15s,box-shadow .15s" style-hover="transform:translateY(-2px);box-shadow:0 14px 32px rgba(0,132,141,.34)" style-active="transform:translateY(0)">
        {{ loginBtnInner }}
      </button>

      <p style="margin:22px 0 0;font-size:12px;color:#8A989C;text-align:center;line-height:1.6;animation:mrfqUp .7s .68s both">الدخول متاح فقط للمستخدمين المصرّح لهم داخل المنصة.</p>
    </div>

    <!-- HERO PANEL (left in RTL) -->
    <div class="mrfq-hero" style="position:relative;overflow:hidden;color:#fff;padding:56px 46px;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(160deg,#003F45 0%,#00646B 52%,#008C84 100%)">
      <div style="position:absolute;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,176,.34),transparent 68%);top:-90px;right:-70px;filter:blur(10px);animation:mrfqFloatA 11s ease-in-out infinite"></div>
      <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(117,206,200,.30),transparent 70%);bottom:-120px;left:-90px;filter:blur(8px);animation:mrfqFloatB 13s ease-in-out infinite"></div>
      <div style="position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 72%);top:42%;left:18%;animation:mrfqFloatC 9s ease-in-out infinite"></div>
      <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(ellipse at 60% 40%,#000,transparent 78%);-webkit-mask-image:radial-gradient(ellipse at 60% 40%,#000,transparent 78%)"></div>

      <div style="position:relative;z-index:2">
        <h2 style="margin:0 0 16px;font-size:36px;font-weight:800;line-height:1.22;letter-spacing:-.5px;animation:mrfqUp .8s .2s both">مِرفق</h2>
        <p style="margin:0 0 36px;font-size:16px;line-height:1.8;color:rgba(255,255,255,.84);max-width:300px;animation:mrfqUp .8s .32s both">منصّة متكاملة لإدارة المرافق والخدمات التشغيلية.</p>
        <div style="display:flex;flex-direction:column;gap:22px">
          <div style="display:flex;align-items:center;gap:15px;font-size:15px;color:rgba(255,255,255,.92);animation:mrfqUp .7s .46s both"><span style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.12);display:grid;place-items:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 10h.01M15 10h.01"/></svg></span>إدارة متكاملة للنظافة والصيانة والضيافة</div>
          <div style="display:flex;align-items:center;gap:15px;font-size:15px;color:rgba(255,255,255,.92);animation:mrfqUp .7s .58s both"><span style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.12);display:grid;place-items:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7"><path d="M3 3v18h18M7 14l4-4 3 3 5-7"/></svg></span>متابعة الأعمال والتقارير لحظياً</div>
          <div style="display:flex;align-items:center;gap:15px;font-size:15px;color:rgba(255,255,255,.92);animation:mrfqUp .7s .7s both"><span style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.12);display:grid;place-items:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>أمان عالٍ وحماية للبيانات</div>
        </div>
        <div style="margin-top:40px;height:2px;width:120px;border-radius:2px;background:rgba(255,255,255,.16);overflow:hidden;animation:mrfqUp .7s .82s both"><span style="display:block;height:100%;width:50%;background:#75CEC8;animation:mrfqLine 2.4s ease-in-out infinite"></span></div>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { showPwd:false, loading:false, remember:true, lang:'ar' };

  eye(open){
    return open
      ? React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','strokeWidth':1.8},
          React.createElement('path',{d:'M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z'}),
          React.createElement('circle',{cx:12,cy:12,r:3}))
      : React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','strokeWidth':1.8,'strokeLinecap':'round'},
          React.createElement('path',{d:'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19'}),
          React.createElement('path',{d:'M1 1l22 22'}));
  }

  check(){
    return React.createElement('svg',{width:13,height:13,viewBox:'0 0 24 24',fill:'none',stroke:'#fff','strokeWidth':3,'strokeLinecap':'round','strokeLinejoin':'round'},
      React.createElement('path',{d:'M20 6 9 17l-5-5'}));
  }

  spinner(){
    return React.createElement('span',{style:{width:'20px',height:'20px',border:'2.5px solid rgba(255,255,255,.4)',borderTopColor:'#fff',borderRadius:'50%',display:'inline-block',animation:'mrfqSpin .7s linear infinite'}});
  }

  arrow(){
    return React.createElement('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','strokeWidth':2,'strokeLinecap':'round','strokeLinejoin':'round'},
      React.createElement('path',{d:'M19 12H5M12 5l-7 7 7 7'}));
  }

  renderVals(){
    const loading = this.state.loading;
    const remember = this.state.remember;
    return {
      pwdType: this.state.showPwd ? 'text' : 'password',
      eyeIcon: this.eye(this.state.showPwd),
      togglePwd: ()=> this.setState(s=>({showPwd:!s.showPwd})),
      toggleRemember: ()=> this.setState(s=>({remember:!s.remember})),
      rememberCheck: remember ? this.check() : null,
      rememberBoxStyle: remember
        ? 'background:#00848D;border:1.5px solid #00848D'
        : 'background:#fff;border:1.5px solid #C9DAD5',
      switchLang: ()=> this.setState(s=>({lang:s.lang==='ar'?'en':'ar'})),
      doLogin: ()=>{
        if(this.state.loading) return;
        this.setState({loading:true});
        setTimeout(()=> this.setState({loading:false}), 1900);
      },
      loginBtnInner: loading
        ? React.createElement(React.Fragment,null, this.spinner(), 'جارٍ الدخول…')
        : React.createElement(React.Fragment,null, 'تسجيل الدخول', this.arrow())
    };
  }
}
</script>
</body>
</html>
